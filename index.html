<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Flow Auditor</title>
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: #16161a;
            --text-main: #d8d8d3;
            --text-muted: #71717a;
            --accent-red: #8b263e;
            --accent-dark-red: #3a101a;
            --border-color: #2b2b2b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .brand-title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .btn-update {
            background-color: var(--accent-dark-red);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-update:hover {
            background-color: var(--accent-red);
            color: var(--text-main);
        }

        .telemetry-grid {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
        }

        .telemetry-row {
            display: flex;
            justify-content: space-between;
        }

        main {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .column-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
        }

        .column-card h2 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-color);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            border-left: 3px solid var(--accent-red);
        }

        .task-count {
            font-weight: bold;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <span class="brand-title">📊 Notion Flow Auditor</span>
            <button class="btn-update" onclick="window.location.reload();">Actualizar Pantalla</button>
        </div>
        <div class="telemetry-grid">
            <div class="telemetry-row">
                <span>Última Sincronización (ART UTC-3):</span>
                <span id="telemetry-time-local" style="color: var(--text-main);">--/--/---- --:--:--</span>
            </div>
            <div class="telemetry-row">
                <span>Próxima Sincronización (ART UTC-3):</span>
                <span id="telemetry-time-next" style="color: #cca43b; font-weight: 600;">--/--/---- --:--:--</span>
            </div>
            <div class="telemetry-row">
                <span>Servidor Cloud (UTC):</span>
                <span id="telemetry-time-server">--/--/---- --:--:--</span>
            </div>
            <div class="telemetry-row" style="margin-top: 4px; border-top: 1px dashed var(--border-color); padding-top: 4px;">
                <span>Peticiones Acumuladas:</span>
                <span id="telemetry-requests">0</span>
            </div>
        </div>
    </header>

    <main>
        <div class="column-card">
            <h2 id="title-ayer">Ayer</h2>
            <div class="tasks-list" id="list-ayer"></div>
        </div>

        <div class="column-card">
            <h2 id="title-hoy">Hoy</h2>
            <div class="tasks-list" id="list-hoy"></div>
        </div>

        <div class="column-card">
            <h2 id="title-manana">Mañana</h2>
            <div class="tasks-list" id="list-manana"></div>
        </div>
    </main>

    <script>
        // METADATOS TÉCNICOS INYECTADOS DINÁMICAMENTE POR EL EXTRACTOR DE PYTHON
        const timestampLocalStr = "22/06/2026 13:07:10";
        const timestampNextStr = "22/06/2026 14:00:00";
        const timestampServerStr = "22/06/2026 16:07:10";
        const totalPeticionesExitosas = 12;
        const diasReales = 0;
        let totalDias = 11;
        const totalAyer = 34;
        const totalManana = 0;

        // ESTRUCTURAS JSON DE DISTRIBUCIÓN POR ESTADOS
        const conteoAyer = {"Hecha": 16, "Fallida / Vencida": 14, "No necesaria": 4};
        const conteoHoy = {"Sin empezar": 4, "Hecha": 14, "No necesaria": 4, "Fallida / Vencida": 8};
        const conteoManana = {};

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("telemetry-time-local").innerText = timestampLocalStr;
            document.getElementById("telemetry-time-next").innerText = timestampNextStr;
            document.getElementById("telemetry-time-server").innerText = timestampServerStr;
            document.getElementById("telemetry-requests").innerText = totalPeticionesExitosas;

            document.getElementById("title-ayer").innerHTML = `Ayer <span>(${totalAyer} tareas)</span>`;
            document.getElementById("title-hoy").innerHTML = `Hoy <span>(${totalDias} tareas)</span>`;
            document.getElementById("title-manana").innerHTML = `Mañana <span>(${totalManana} tareas)</span>`;

            renderizarSeccion("list-ayer", conteoAyer);
            renderizarSeccion("list-hoy", conteoHoy);
            renderizarSeccion("list-manana", conteoManana);
        });

        function renderizarSeccion(containerId, data) {
            const container = document.getElementById(containerId);
            if (!data || Object.keys(data).length === 0) {
                container.innerHTML = `<div class="task-item" style="color: var(--text-muted); border-left-color: var(--text-muted);">Sin tareas registradas</div>`;
                return;
            }

            container.innerHTML = Object.entries(data).map(([estado, cantidad]) => {
                return `
                    <div class="task-item">
                        <span>${estado}</span>
                        <span class="task-count">${cantidad}</span>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
