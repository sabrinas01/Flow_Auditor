<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Flow Auditor</title>
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: #16161a;
            --text-main: #d8d8d3;
            --text-muted: #71717a;
            --accent-green: #367e6d;
            --accent-dark-green: #0f3627;
            --accent-red: #8b263e;
            --accent-dark-red: #3a101a;
            --border-color: #2b2b2b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .brand-title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .btn-update {
            background-color: var(--accent-dark-green);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-update:hover {
            background-color: var(--accent-green);
            color: var(--bg-color);
        }

        .telemetry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
        }

        main {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .column-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
        }

        .column-card h2 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-color);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            border-left: 3px solid var(--text-muted);
        }

        .task-item.hecha { border-left-color: var(--accent-green); }
        .task-item.progreso { border-left-color: #cca43b; }

        .task-count {
            font-weight: bold;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <span class="brand-title">🛡️ Notion Flow Auditor</span>
            <a href="#" class="btn-update" onclick="window.location.reload();">Actualizar Dashboard</a>
        </div>
        <div class="telemetry-grid">
            <div>Sincro Cloud: <span id="telemetry-time">--/--/---- --:--:--</span></div>
            <div style="text-align: right;">Peticiones Red: <span id="telemetry-requests">0</span></div>
        </div>
    </header>

    <main>
        <div class="column-card">
            <h2 id="title-ayer">Ayer</h2>
            <div class="tasks-list" id="list-ayer"></div>
        </div>

        <div class="column-card">
            <h2 id="title-hoy">Hoy</h2>
            <div class="tasks-list" id="list-hoy"></div>
        </div>

        <div class="column-card">
            <h2 id="title-manana">Mañana</h2>
            <div class="tasks-list" id="list-manana"></div>
        </div>
    </main>

    <script>
        // METADATOS TÉCNICOS INYECTADOS DINÁMICAMENTE POR EL EXTRACTOR DE PYTHON
        const ultimaActualizacionStr = "21/06/2026 22:40:00";
        const totalPeticionesExitosas = 1;
        const diasReales = 0;
        let totalDias = 0;
        const totalAyer = 0;
        const totalManana = 0;

        // ESTRUCTURAS JSON DE DISTRIBUCIÓN POR ESTADOS
        const conteoAyer = {};
        const conteoHoy = {};
        const conteoManana = {};

        // RENDERIZADO ASÍNCRONO DEL FRONTEND
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("telemetry-time").innerText = ultimaActualizacionStr;
            document.getElementById("telemetry-requests").innerText = totalPeticionesExitosas;

            // Renderizar Títulos con contadores integrados (Opción A)
            document.getElementById("title-ayer").innerHTML = `Ayer <span>(${totalAyer} ${totalAyer === 1 ? 'tarea' : 'tareas'})</span>`;
            document.getElementById("title-hoy").innerHTML = `Hoy <span>(${totalDias} ${totalDias === 1 ? 'tarea' : 'tareas'})</span>`;
            document.getElementById("title-manana").innerHTML = `Mañana <span>(${totalManana} ${totalManana === 1 ? 'tarea' : 'tareas'})</span>`;

            // Pintar los listados de estados
            renderizarSeccion("list-ayer", conteoAyer);
            renderizarSeccion("list-hoy", conteoHoy);
            renderizarSeccion("list-manana", conteoManana);
        });

        function renderizarSeccion(containerId, data) {
            const container = document.getElementById(containerId);
            if (!data || Object.keys(data).length === 0) {
                container.innerHTML = `<div class="task-item" style="color: var(--text-muted);">Sin tareas registradas</div>`;
                return;
            }

            container.innerHTML = Object.entries(data).map(([estado, cantidad]) => {
                let claseEstado = '';
                if (estado.toLowerCase() === 'hecha') claseEstado = 'hecha';
                else if (estado.toLowerCase() === 'en progreso' || estado.toLowerCase() === 'progreso') claseEstado = 'progreso';

                return `
                    <div class="task-item ${claseEstado}">
                        <span>${estado}</span>
                        <span class="task-count">${cantidad}</span>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
