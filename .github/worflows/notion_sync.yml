steps:
# 1. Descargar el código de tu repositorio
- name: Checkout Code
  uses: actions/checkout@v3

# 2. Configurar Python
- name: Set up Python
  uses: actions/setup-python@v4
  with:
    python-version: '3.10'

# 3. Instalar las dependencias de red de tu script
- name: Install Dependencies
  run: |
    python -m pip install --upgrade pip
    pip install requests python-dotenv

# 4. Ejecutar tu validador e inyector híbrido
# Notación de seguridad: Consumimos tus API Keys de manera segura desde GitHub Secrets
- name: Run Notion Flow Auditor
  env:
    NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
    NOTION_DB_RECORDATORIOS_DIARIOS: ${{ secrets.NOTION_DB_RECORDATORIOS_DIARIOS }}
  run: python extract_and_audit.py

# 5. Guardar los cambios inyectados e historial en tu rama 'main_fa' para actualizar tu celular
- name: Commit and Push Changes
  run: |
    git config --global user.name "Notion Daemon Cloud"
    git config --global user.email "daemon@bitacorait.com"
    git add index.html peticiones_contador.txt
    # Solo hace push si hay un cambio real en tus hábitos de Notion
    git diff-index --quiet HEAD || (git commit -m "update: sync automático cloud de hábitos ☁️" && git push origin HEAD:main_fa)
