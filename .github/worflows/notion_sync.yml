name: Flujo de Sincronización Automática

on:
  schedule:
    # Se ejecuta de forma automatizada cada 3 horas en la nube
    - cron: '0 */3 * * *'
  workflow_dispatch:
    # Habilita el botón manual de ejecución en la web de GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Permite al script inyectar datos en index.html
    steps:
      # 1. Descargar el código de tu repositorio
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Configurar Python con la sangría (indentación) correcta
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Instalar las dependencias de red de tu script
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      # 4. Ejecutar tu validador e inyector híbrido pasando secretos
      - name: Run Notion Flow Auditor
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DB_RECORDATORIOS_DIARIOS: ${{ secrets.NOTION_DB_RECORDATORIOS_DIARIOS }}
        run: python extract_and_audit.py

      # 5. Guardar los cambios inyectados en tu rama 'main_fa'
      - name: Commit and Push Changes
        run: |
          git config --global user.name "Notion Daemon Cloud"
          git config --global user.email "daemon@bitacorait.com"
          git add index.html peticiones_contador.txt
          # Solo realiza push si se detectaron cambios reales en tus hábitos
          git diff-index --quiet HEAD || (git commit -m "update: sync automático cloud de hábitos ☁️" && git push origin HEAD:main_fa)
