name: Flujo de Sincronización Automática

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run Notion Flow Auditor
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DB_RECORDATORIOS_DIARIOS: ${{ secrets.NOTION_DB_RECORDATORIOS_DIARIOS }}
        run: python extract_and_audit.py

      # 4. Mapeamos de forma redundante los secretos por si se guardaron con nombres diferentes
      - name: Run Notion Flow Auditor
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY || secrets.NOTION_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_API_KEY || secrets.NOTION_TOKEN }}
          NOTION_DB_RECORDATORIOS_DIARIOS: ${{ secrets.NOTION_DB_RECORDATORIOS_DIARIOS || secrets.NOTION_DATABASE_ID || secrets.NOTION_DB_ID }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DB_RECORDATORIOS_DIARIOS || secrets.NOTION_DATABASE_ID || secrets.NOTION_DB_ID }}
        run: python extract_and_audit.py