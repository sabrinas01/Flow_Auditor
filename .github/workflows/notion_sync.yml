name: Flujo de Sincronización Automática

on:
  schedule:
    - cron: '0 * * * *' # Corre de forma autónoma cada 1 hora (24/7)
  workflow_dispatch: # Permite forzar el encendido manual desde la web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Verify Secrets
        run: |
          if [ -z "$NOTION_API_KEY" ]; then
            echo "❌ ERROR: NOTION_API_KEY is not set"
            exit 1
          fi
          if [ -z "$NOTION_DB_RECORDATORIOS_DIARIOS" ]; then
            echo "❌ ERROR: NOTION_DB_RECORDATORIOS_DIARIOS is not set"
            exit 1
          fi
          echo "✅ Secrets loaded successfully"
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DB_RECORDATORIOS_DIARIOS: ${{ secrets.NOTION_DB_RECORDATORIOS_DIARIOS }}

      - name: Run Notion Flow Auditor
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DB_RECORDATORIOS_DIARIOS: ${{ secrets.NOTION_DB_RECORDATORIOS_DIARIOS }}
        run: python extract_and_audit.py

      - name: Commit and Push Changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
                    
          # Control estricto de cambios: Evita loops infinitos si no hay mutación real
          git diff --quiet && git diff --staged --quiet || git commit -m "auto: actualización horaria de consistencia de flujos"
          
          git push origin main --force
