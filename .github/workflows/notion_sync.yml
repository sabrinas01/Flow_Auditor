name: Flujo de Sincronización Automática

on:
  schedule:
    # Sincronización automática de forma autónoma cada 1 hora (24/7)
    - cron: '0 * * * *'
  workflow_dispatch: # Permite forzar el encendido manual desde la interfaz web de GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
            fetch-depth: 0   # necesario para que Git pueda ver los tags

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Verify Secrets
        run: |
          if [ -z "$NOTION_API_KEY" ] && [ -z "$NOTION_TOKEN" ]; then
            echo "❌ ERROR: No se detectó el token de la API de Notion en los secretos"
            exit 1
          fi
          if [ -z "$NOTION_DB_RECORDATORIOS_DIARIOS" ] && [ -z "$NOTION_DATABASE_ID" ]; then
            echo "❌ ERROR: No se detectó el ID de la base de datos de Notion en los secretos"
            exit 1
          fi
          echo "✅ Secretos validados y cargados correctamente en el entorno"
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY || secrets.NOTION_TOKEN }}
          NOTION_DB_RECORDATORIOS_DIARIOS: ${{ secrets.NOTION_DB_RECORDATORIOS_DIARIOS || secrets.NOTION_DATABASE_ID || secrets.NOTION_DB_ID }}

      - name: Run Notion Flow Auditor
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY || secrets.NOTION_TOKEN }}
          NOTION_DB_RECORDATORIOS_DIARIOS: ${{ secrets.NOTION_DB_RECORDATORIOS_DIARIOS || secrets.NOTION_DATABASE_ID || secrets.NOTION_DB_ID }}
        run: python extract_and_audit.py

      - name: Commit and Push Changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Agregamos index.html de forma segura al área de preparación (stage)
          git add index.html || true

          # Comprobamos explícitamente si hay cambios staged reales para evitar commits vacíos
          if ! git diff --staged --quiet; then
            git commit -m "auto: actualización horaria de consistencia de flujos"
            git push origin main --force
            echo "✅ Cambios confirmados y desplegados de forma exitosa en GitHub Pages."
          else
            echo "⚠️ No se detectaron cambios en index.html, omitiendo commit de forma segura."
          fi