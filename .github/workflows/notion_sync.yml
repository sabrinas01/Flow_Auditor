name: Flujo de Sincronización Automática

on:
  schedule:
    - cron: '0 * * * *' # Corre de forma autónoma cada 1 hora (24/7)
  workflow_dispatch: # Te permite forzar el encendido manual si lo deseas

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run Notion Flow Auditor
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY || secrets.NOTION_TOKEN }}
          NOTION_DB_RECORDATORIOS_DIARIOS: ${{ secrets.NOTION_DB_RECORDATORIOS_DIARIOS || secrets.NOTION_DATABASE_ID || secrets.NOTION_DB_ID }}
        run: python extract_and_audit.py

      - name: Commit and Push Changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git status
          
          git add index.html peticiones_contador.txt || true
          git commit -m "auto: actualización horaria de consistencia de flujos" || echo "Sin cambios para commitear"
          git push origin main --force
        